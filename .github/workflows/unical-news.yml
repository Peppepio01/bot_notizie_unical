Capito, dobbiamo investigare. Lo script gira, non dà errori di rete, ma trova zero notizie — questo fa pensare che il sito veda le richieste provenienti dai server di GitHub Actions in modo diverso da quando le facciamo noi dal browser (capita spesso con siti universitari/istituzionali che hanno protezioni anti-bot tipo Cloudflare, che possono bloccare o filtrare le richieste da datacenter cloud).

Aggiungo un po' di log di debug allo script per vedere esattamente cosa risponde il sito quando viene chiamato da GitHub, così capiamo la causa esatta.


